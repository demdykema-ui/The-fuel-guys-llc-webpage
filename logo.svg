<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e6b422;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4a017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e6b422;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c49512;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Gear/Cog Background Element -->
  <g transform="translate(300, 280)" fill="none" stroke="url(#goldGrad)" stroke-width="3" opacity="0.35">
    <!-- Outer gear teeth -->
    <path d="M0,-140 L12,-138 18,-155 30,-150 28,-132 42,-125 52,-140 62,-130 52,-115 64,-104 78,-115 85,-102 72,-93 80,-78 96,-84 100,-68 85,-65 88,-48 105,-48 105,-32 88,-32 86,-14 104,-8 100,8 84,4 76,22 92,32 84,46 70,38 58,52 70,66 58,76 46,64 32,74 38,90 24,94 18,78 2,82 2,100 -2,100 -2,82 -18,78 -24,94 -38,90 -32,74 -46,64 -58,76 -70,66 -58,52 -70,38 -84,46 -92,32 -76,22 -84,4 -100,8 -104,-8 -86,-14 -88,-32 -105,-32 -105,-48 -88,-48 -85,-65 -100,-68 -96,-84 -80,-78 -72,-93 -85,-102 -78,-115 -64,-104 -52,-115 -62,-130 -52,-140 -42,-125 -28,-132 -30,-150 -18,-155 -12,-138 0,-140Z"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="90" stroke-width="4"/>
    <circle cx="0" cy="0" r="70" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Tanker Truck Silhouette -->
  <g transform="translate(150, 210)" fill="url(#goldGrad)">
    <!-- Truck cab -->
    <path d="M0,80 L0,30 Q0,10 15,5 L60,0 Q75,0 80,10 L85,25 L110,25 Q120,25 120,35 L120,80 Z" />
    <!-- Cab window -->
    <path d="M12,28 L55,12 Q65,10 68,18 L72,28 L75,28 Q78,28 78,32 L78,48 L12,48 Z" fill="#0a0a0a" opacity="0.7"/>
    <!-- Cab details -->
    <rect x="5" y="55" width="30" height="8" rx="2" fill="#0a0a0a" opacity="0.4"/>
    <rect x="85" y="30" width="6" height="15" rx="1" opacity="0.8"/>

    <!-- Tank body -->
    <path d="M120,20 L280,15 Q300,15 300,35 L300,70 Q300,85 280,85 L120,85 Z"/>
    <!-- Tank highlight -->
    <ellipse cx="210" cy="35" rx="75" ry="8" fill="#0a0a0a" opacity="0.15"/>
    <!-- Tank bands -->
    <rect x="155" y="15" width="4" height="72" rx="2" fill="#0a0a0a" opacity="0.2"/>
    <rect x="235" y="15" width="4" height="72" rx="2" fill="#0a0a0a" opacity="0.2"/>

    <!-- Rear fender/bumper -->
    <rect x="280" y="65" width="18" height="20" rx="3"/>

    <!-- Undercarriage -->
    <rect x="0" y="80" width="300" height="8" rx="2" opacity="0.6"/>

    <!-- Hose reel (side of tank) -->
    <circle cx="270" cy="50" r="12" fill="none" stroke="#0a0a0a" stroke-width="2" opacity="0.3"/>
    <circle cx="270" cy="50" r="5" fill="#0a0a0a" opacity="0.3"/>

    <!-- Front wheel -->
    <g transform="translate(45, 88)">
      <circle cx="0" cy="0" r="22" fill="#0a0a0a" stroke="url(#goldGrad)" stroke-width="3"/>
      <circle cx="0" cy="0" r="14" fill="#1a1a1a"/>
      <circle cx="0" cy="0" r="8" fill="url(#goldGrad)" opacity="0.4"/>
      <circle cx="0" cy="0" r="4" fill="#0a0a0a"/>
    </g>

    <!-- Rear wheel set 1 -->
    <g transform="translate(220, 88)">
      <circle cx="0" cy="0" r="22" fill="#0a0a0a" stroke="url(#goldGrad)" stroke-width="3"/>
      <circle cx="0" cy="0" r="14" fill="#1a1a1a"/>
      <circle cx="0" cy="0" r="8" fill="url(#goldGrad)" opacity="0.4"/>
      <circle cx="0" cy="0" r="4" fill="#0a0a0a"/>
    </g>

    <!-- Rear wheel set 2 -->
    <g transform="translate(268, 88)">
      <circle cx="0" cy="0" r="22" fill="#0a0a0a" stroke="url(#goldGrad)" stroke-width="3"/>
      <circle cx="0" cy="0" r="14" fill="#1a1a1a"/>
      <circle cx="0" cy="0" r="8" fill="url(#goldGrad)" opacity="0.4"/>
      <circle cx="0" cy="0" r="4" fill="#0a0a0a"/>
    </g>
  </g>

  <!-- "THE" text -->
  <text x="300" y="105" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="58" fill="url(#goldGrad)" letter-spacing="12">THE</text>

  <!-- "FUEL GUYS" text -->
  <text x="300" y="185" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="78" fill="url(#goldGrad)" letter-spacing="4">FUEL GUYS</text>

  <!-- Bottom curved banner for "DIESEL DELIVERY" -->
  <g transform="translate(300, 420)">
    <!-- Banner arc -->
    <path d="M-140,0 Q-100,25 0,30 Q100,25 140,0" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.6"/>
    <path d="M-140,8 Q-100,33 0,38 Q100,33 140,8" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.3"/>
  </g>

  <text x="300" y="455" text-anchor="middle" font-family="'Arial Black', 'Impact', sans-serif" font-weight="900" font-size="38" fill="url(#goldGrad)" letter-spacing="8">DIESEL DELIVERY</text>

  <!-- Decorative lines flanking bottom text -->
  <line x1="112" y1="440" x2="165" y2="440" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5"/>
  <line x1="435" y1="440" x2="488" y2="440" stroke="url(#goldGrad)" stroke-width="2" opacity="0.5"/>
</svg>
